name: Build Debug APK

# Se ejecuta en cada push a main y también manualmente desde la pestaña Actions.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # No usamos gradlew (evita depender del binario gradle-wrapper.jar).
      # Esta action instala Gradle directamente y cachea dependencias.
      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Compilar APK de depuración
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: chrome-lite-anonymous-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
